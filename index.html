<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的主页</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      color: #333;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 40px 20px 30px;
      text-align: center;
    }

    header h1 {
      font-size: 1.8rem;
      margin-bottom: 8px;
    }

    header p {
      font-size: 0.95rem;
      opacity: 0.85;
    }

    .avatar {
      width: 80px;
      height: 80px;
      background: rgba(255,255,255,0.3);
      border-radius: 50%;
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }

    main {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px 16px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .card h2 {
      font-size: 1rem;
      color: #667eea;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card p {
      font-size: 0.9rem;
      line-height: 1.7;
      color: #555;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }

    .tag {
      background: #eef0ff;
      color: #667eea;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.82rem;
    }

    .link-list {
      list-style: none;
    }

    .link-list li {
      border-bottom: 1px solid #f0f0f0;
    }

    .link-list li:last-child {
      border-bottom: none;
    }

    .link-list a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      text-decoration: none;
      color: #333;
      font-size: 0.9rem;
    }

    .link-list a:hover {
      color: #667eea;
    }

    .arrow {
      color: #bbb;
      font-size: 0.8rem;
    }

    footer {
      text-align: center;
      padding: 24px 16px;
      font-size: 0.8rem;
      color: #aaa;
    }
  </style>
</head>
<body>

  <header>
    <div class="avatar">👋</div>
    <h1>你好，我是 Yahan</h1>
    <p>欢迎来到我的主页</p>
  </header>

  <main>

    <div class="card">
      <h2>📝 关于我</h2>
      <p>这是一个手机端适配的个人主页示例，你可以在这里写自我介绍、展示项目或分享链接。</p>
    </div>

    <div class="card">
      <h2>🏷️ 技能标签</h2>
      <div class="tag-list">
        <span class="tag">Python</span>
        <span class="tag">数据分析</span>
        <span class="tag">机器学习</span>
        <span class="tag">HTML/CSS</span>
        <span class="tag">Git</span>
      </div>
    </div>

    <div class="card">
      <h2>🔗 我的链接</h2>
      <ul class="link-list">
        <li><a href="https://github.com" target="_blank"><span>GitHub</span><span class="arrow">›</span></a></li>
        <li><a href="#" target="_blank"><span>我的项目</span><span class="arrow">›</span></a></li>
        <li><a href="mailto:guyahan347@gmail.com"><span>发送邮件</span><span class="arrow">›</span></a></li>
      </ul>
    </div>

  </main>

  <footer>
    © 2026 Yahan · 用 GitHub Pages 托管
  </footer>

</body>
</html>
